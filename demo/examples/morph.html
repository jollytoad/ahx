<!DOCTYPE html>
<html ahx-debug-events>
  <head>
    <title>ahx examples</title>
    <meta name="viewport" content="width=device-width">
    <script src="/inject-ahx.js"></script>

    <style>
      article {
        --on-ready: once |> get _morph_1.html |> sanitize |> swap outer;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>
          <strong>ahx</strong> examples
        </h1>
      </header>

      <h2>Morphing of content</h2>

      <form class="buttons">
        <button
          type="button"
          on-click="form |> get |> sanitize |> target article |> morph outer"
        >
          Morph
        </button>
        <button
          type="button"
          on-click="form |> get |> sanitize |> target article |> morph idiomorph outer"
        >
          Idiomorph
        </button>
        <button
          type="button"
          on-click="form |> get |> sanitize |> target article |> morph morphlex outer"
        >
          Morphlex
        </button>
      </form>

      <section class="box">
        <article></article>
      </section>

      <footer>
        <a href="..">back</a>
      </footer>
    </main>
  </body>
</html>
