<!DOCTYPE html>
<html lang="en-GB">
  <head>
    <title>ahx examples</title>
    <meta name="viewport" content="width=device-width">
    <script src="/inject-ahx.js"></script>

    <style>
      th:nth-child(1) {
        --on-click: target closest table |> target tbody |> sort children
          td:nth-child(1) |> target this |> dispatch sorted;
      }
      th:nth-child(2) {
        --on-click: target closest table |> target tbody |> sort children
          td:nth-child(2) |> target this |> dispatch sorted;
      }
      th:nth-child(3) {
        --on-click: target closest table |> target tbody |> sort children
          td:nth-child(3) |> target this |> dispatch sorted;
      }
      th:nth-child(4) {
        --on-click: target closest table |> target tbody |> sort children
          td:nth-child(4) |> target this |> dispatch sorted;
      }
      th {
        --on-sorted: target closest thead |> target th |> attr remove
          aria-sorted |> target this |> attr set aria-sorted ascending;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>
          <strong>ahx</strong> examples
        </h1>
      </header>

      <h2>Sort</h2>

      <table on-ready="get table |> swap inner"></table>

      <footer>
        <a href="..">back</a>
      </footer>
    </main>
  </body>
</html>
