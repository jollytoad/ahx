<!DOCTYPE html>
<html lang="en-GB">
  <head>
    <title>ahx examples</title>
    <meta name="viewport" content="width=device-width">
    <script src="/inject-ahx.js"></script>

    <style>
      th {
        --on-ready: attr set role button |> attr set tabindex 0;
        --on-click: dispatch sort;
        --on-keyup: key dispatch Enter ArrowLeft ArrowRight;
        --on-keyup-Enter: dispatch sort;
        --on-keyup-ArrowLeft: target previous th |> focus;
        --on-keyup-ArrowRight: target next th |> focus;
        --on-sort: sort column;
      }
      th[role="button"] {
        cursor: pointer;
        background: var(--interactive-bg);
      }
      th[role="button"]:hover {
        filter: brightness(1.1);
      }
      th::after {
        width: 1em;
        margin: 0 0.5ex;
        content: "♢";
        display: inline-block;
      }
      th[aria-sort="ascending"]::after {
        content: "▲";
      }
      th[aria-sort="descending"]::after {
        content: "▼";
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>
          <strong>ahx</strong> examples
        </h1>
      </header>

      <h2>Sort</h2>

      <table on-ready="get table |> swap inner"></table>

      <footer>
        <a href="..">back</a>
      </footer>
    </main>
  </body>
</html>
